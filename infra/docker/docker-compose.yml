services:
  api:
    build:
      context: ../../services/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://gengscope:gengscope@postgres:5432/gengscope
      ARTIFACT_STORAGE_DIR: /data/artifacts
      ARTIFACT_FETCH_MAX_BYTES: ${ARTIFACT_FETCH_MAX_BYTES:-52428800}
      ARTIFACT_FETCH_ALLOW_PRIVATE_NETWORKS: ${ARTIFACT_FETCH_ALLOW_PRIVATE_NETWORKS:-0}
      ARTIFACT_FETCH_MIN_INTERVAL_SECONDS: ${ARTIFACT_FETCH_MIN_INTERVAL_SECONDS:-0}
      GENGSCOPE_API_KEY: ${GENGSCOPE_API_KEY:-}
      GENGSCOPE_API_KEYS: ${GENGSCOPE_API_KEYS:-}
      GENGSCOPE_API_KEY_ROLES: ${GENGSCOPE_API_KEY_ROLES:-}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-20}
      OPENALEX_EMAIL: ${OPENALEX_EMAIL:-}
    ports:
      - "${GENGSCOPE_API_PORT:-8010}:8000"
    volumes:
      - gengscope_artifacts:/data/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  worker:
    build:
      context: ../../services/api
    command: ["gengscope-worker", "--poll-interval", "5", "--recover-stale-after", "3600"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://gengscope:gengscope@postgres:5432/gengscope
      ARTIFACT_STORAGE_DIR: /data/artifacts
      ARTIFACT_FETCH_MAX_BYTES: ${ARTIFACT_FETCH_MAX_BYTES:-52428800}
      ARTIFACT_FETCH_ALLOW_PRIVATE_NETWORKS: ${ARTIFACT_FETCH_ALLOW_PRIVATE_NETWORKS:-0}
      ARTIFACT_FETCH_MIN_INTERVAL_SECONDS: ${ARTIFACT_FETCH_MIN_INTERVAL_SECONDS:-0}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-20}
      OPENALEX_EMAIL: ${OPENALEX_EMAIL:-}
    volumes:
      - gengscope_artifacts:/data/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gengscope
      POSTGRES_PASSWORD: gengscope
      POSTGRES_DB: gengscope
    ports:
      - "${GENGSCOPE_POSTGRES_PORT:-54329}:5432"
    volumes:
      - gengscope_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gengscope -d gengscope"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

volumes:
  gengscope_pg:
  gengscope_artifacts:
